<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="404 - Page Not Found | Better Nothing Music Visualizer">
    <title>404 - Lost in the Void</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="../Docs/app-icon.png">
</head>

<body class="error-page">
    <!-- Custom Cursor -->
    <div class="custom-cursor" id="customCursor"></div>

    <!-- Particle Background -->
    <canvas class="particles-canvas" id="particlesCanvas"></canvas>

    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo">
                    <img src="../Docs/app-icon.png" alt="BNMV Logo" class="logo-img">
                    BNMV
                </a>

                <div class="nav-right">
                    <button class="theme-toggle" id="themeToggle" aria-label="Toggle Dark Mode">
                        <span class="icon-sun">☀</span>
                        <span class="icon-moon">☾</span>
                    </button>
                </div>
            </nav>
        </div>
    </header>

    <main class="error-container container">
        <div class="error-content fade-in-section is-visible">
            <div class="error-code">404</div>
            <h1>Lost in the Void.</h1>
            <p>The frequency you're looking for doesn't exist. It might have been moved, deleted, or never existed in this dimension.</p>
            <div class="error-actions">
                <a href="index.html" class="btn btn-primary">Return Home</a>
                <a href="https://github.com/Aleks-Levet/better-nothing-music-visualizer" class="btn btn-secondary">Report Issue</a>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p class="copyright">&copy; <span id="year"></span> Better Nothing Music Visualizer Team.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
